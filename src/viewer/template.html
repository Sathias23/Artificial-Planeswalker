<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deck Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Oswald:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0c0709; overflow: hidden;
    font-family: 'Space Grotesk', sans-serif; color: #f3ece2; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,138,90,.4); }

  /* --- Card (atomic). Border colour comes from --bd (per card colour identity). --- */
  .card {
    position: relative; width: 128px; height: 179px; border-radius: 9px;
    overflow: hidden; cursor: pointer; background: #0b0608;
    border: 1px solid var(--bd, rgba(255,255,255,.12));
    box-shadow: 0 6px 16px rgba(0,0,0,.55);
    transition: transform .16s cubic-bezier(.2,.7,.3,1), box-shadow .16s, border-color .16s;
    will-change: transform;
  }
  .card.selected {
    border-color: rgba(255,184,96,.95);
    box-shadow: 0 0 0 2px rgba(255,176,84,.55), 0 12px 30px rgba(255,120,40,.3);
  }
  /* :hover declared last so it wins the tie over .selected while hovering. */
  .card:hover {
    transform: translateY(-12px) scale(1.07); z-index: 60;
    box-shadow: 0 20px 42px rgba(0,0,0,.72), 0 0 24px rgba(255,120,50,.4);
    border-color: rgba(255,176,96,.85);
  }
</style>
</head>
<body>
<div id="app" style="width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;"></div>

<!-- Deck data injected by src/viewer/render.py (replaces __DECK_JSON__). -->
<script type="application/json" id="deck-json">__DECK_JSON__</script>

<script>
(function () {
  "use strict";
  var DECK = JSON.parse(document.getElementById("deck-json").textContent);

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function pipsHtml(pips, size, font) {
    return (pips || []).map(function (p) {
      return '<span style="width:' + size + "px;height:" + size +
        "px;border-radius:50%;display:flex;align-items:center;justify-content:center;" +
        "font-family:'Space Grotesk',sans-serif;font-size:" + font +
        "px;font-weight:700;background:" + p.bg + ";color:" + p.color +
        ';box-shadow:inset 0 0 0 1px rgba(0,0,0,.45),0 1px 2px rgba(0,0,0,.5);">' +
        esc(p.label) + "</span>";
    }).join("");
  }

  var RARITY = { mythic: "#ff7a1a", rare: "#d9b24a", uncommon: "#9fb0c0", common: "#3a3a42" };

  function cardHtml(c) {
    var rar = RARITY[c.rarity] || "#3a3a42";
    return '<div class="card" data-card-id="' + esc(c.id) + '" style="--bd:' + c.border + ';">' +
      '<div style="position:absolute;inset:0;background:' + c.art + ';"></div>' +
      '<div style="position:absolute;inset:0;box-shadow:inset 0 -42px 52px rgba(8,4,6,.88), inset 0 20px 32px rgba(8,4,6,.62);"></div>' +
      '<div style="position:absolute;top:0;left:0;right:0;height:24px;display:flex;align-items:center;justify-content:space-between;gap:4px;padding:0 6px;background:linear-gradient(180deg, rgba(8,4,6,.94), rgba(8,4,6,.45));">' +
        '<span style="font-family:\'Oswald\',sans-serif;font-weight:600;font-size:11.5px;line-height:1;color:#f3ece2;letter-spacing:.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(c.name) + "</span>" +
        '<div style="display:flex;gap:2px;flex-shrink:0;">' + pipsHtml(c.pips, 12, 8) + "</div>" +
      "</div>" +
      '<div style="position:absolute;bottom:22px;right:6px;display:flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;background:rgba(8,4,6,.86);box-shadow:0 2px 8px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.09);font-weight:700;font-size:11px;color:#fff;">&times;' + esc(c.qty) + "</div>" +
      '<div style="position:absolute;bottom:0;left:0;right:0;height:18px;display:flex;align-items:center;gap:5px;padding:0 6px;background:linear-gradient(0deg, rgba(8,4,6,.96), rgba(8,4,6,.45));">' +
        '<span style="width:7px;height:7px;border-radius:50%;background:' + rar + ";box-shadow:0 0 5px " + rar + ';flex-shrink:0;"></span>' +
        '<span style="font-size:7.5px;color:#b7adc0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.2px;">' + esc(c.typeLine) + "</span>" +
      "</div>" +
    "</div>";
  }

  function columnsHtml() {
    return DECK.columns.map(function (col) {
      var stack = col.cards.map(function (c) {
        return '<div style="margin-top:-134px;position:relative;">' + cardHtml(c) + "</div>";
      }).join("");
      return '<div style="width:128px;flex-shrink:0;display:flex;flex-direction:column;">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px;">' +
          '<span style="font-family:\'Cinzel\',serif;font-weight:700;font-size:15px;color:#e7ddd0;">' + esc(col.label) + "</span>" +
          '<span style="font-size:10px;font-weight:600;color:#8f8598;background:rgba(255,255,255,.05);border-radius:999px;padding:2px 7px;">' + esc(col.count) + "</span>" +
        "</div>" +
        '<div style="display:flex;flex-direction:column;padding-top:134px;">' + stack + "</div>" +
      "</div>";
    }).join("");
  }

  function curveHtml() {
    return DECK.curve.map(function (cv) {
      return '<div style="display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;">' +
        '<span style="font-size:10px;font-weight:700;color:#c9bfd4;">' + esc(cv.count) + "</span>" +
        '<div style="width:100%;display:flex;align-items:flex-end;height:72px;">' +
          '<div style="width:100%;height:' + cv.hLg + ';background:linear-gradient(180deg,#ff7a1a,#c01818);border-radius:3px 3px 0 0;box-shadow:0 0 10px rgba(255,120,40,.3);"></div>' +
        "</div>" +
        '<span style="font-size:9.5px;color:#8f8598;">' + esc(cv.label) + "</span>" +
      "</div>";
    }).join("");
  }

  function legendHtml() {
    return DECK.pieLegend.map(function (lg) {
      return '<div style="display:flex;align-items:center;gap:8px;font-size:11.5px;color:#c9bfd4;">' +
        '<span style="width:10px;height:10px;border-radius:3px;background:' + lg.color + ';"></span>' +
        '<span style="flex:1;">' + esc(lg.name) + "</span>" +
        '<span style="color:#8f8598;">' + esc(lg.pct) + "</span>" +
      "</div>";
    }).join("");
  }

  function landsHtml() {
    if (!DECK.lands.length) return '<span style="font-size:11.5px;color:#8f8598;">No lands</span>';
    return DECK.lands.map(function (ld) {
      return '<div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:7px 11px 7px 8px;">' +
        '<span style="width:18px;height:24px;border-radius:3px;background:' + ld.swatch + ';box-shadow:inset 0 0 0 1px rgba(0,0,0,.3);"></span>' +
        '<span style="font-size:11.5px;color:#cfc8d6;">' + esc(ld.name) + "</span>" +
        '<span style="font-size:11px;font-weight:700;color:#ff9a5a;">&times;' + esc(ld.qty) + "</span>" +
      "</div>";
    }).join("");
  }

  function allCards() {
    return DECK.columns.reduce(function (acc, col) { return acc.concat(col.cards); }, []);
  }

  var cards = allCards();
  var selectedId = cards.length ? cards[0].id : null;

  function previewHtml() {
    var sel = cards.filter(function (c) { return c.id === selectedId; })[0] || cards[0];
    if (!sel) {
      return '<div style="width:256px;height:357px;border-radius:14px;background:#120b0e;display:flex;align-items:center;justify-content:center;color:#8f8598;font-size:12px;">No cards</div>';
    }
    return '<div style="position:relative;width:256px;height:357px;border-radius:14px;overflow:hidden;border:1px solid rgba(255,176,96,.42);box-shadow:0 18px 44px rgba(0,0,0,.6),0 0 30px rgba(255,120,50,.16);background:#0b0608;flex-shrink:0;">' +
      '<div style="position:absolute;inset:0;background:' + sel.art + ';"></div>' +
      '<div style="position:absolute;inset:0;box-shadow:inset 0 -90px 80px rgba(8,4,6,.92),inset 0 30px 40px rgba(8,4,6,.55);"></div>' +
      '<div style="position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;background:linear-gradient(180deg,rgba(8,4,6,.94),transparent);">' +
        '<span style="font-family:\'Oswald\',sans-serif;font-weight:600;font-size:17px;letter-spacing:.3px;color:#f6efe6;line-height:1.15;">' + esc(sel.name) + "</span>" +
        '<div style="display:flex;gap:3px;flex-shrink:0;">' + pipsHtml(sel.pips, 19, 11) + "</div>" +
      "</div>" +
      '<div style="position:absolute;bottom:0;left:0;right:0;padding:14px;">' +
        '<div style="font-size:10.5px;letter-spacing:.4px;color:#ffb289;margin-bottom:7px;">' + esc(sel.typeLine) + "</div>" +
        '<div style="background:rgba(8,4,6,.72);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 11px;font-size:10.5px;line-height:1.5;color:#d4ccdc;">' + esc(sel.oracle) + "</div>" +
      "</div>" +
    "</div>";
  }

  function render() {
    document.getElementById("app").innerHTML =
      // titlebar
      '<div style="height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;background:#080507;padding-left:12px;border-bottom:1px solid rgba(255,255,255,.05);">' +
        '<div style="display:flex;align-items:center;gap:9px;">' +
          '<div style="width:15px;height:15px;border-radius:4px;background:conic-gradient(from 220deg,#ff7a1a,#e23a1e,#9333ea,#2a44e8,#ff7a1a);"></div>' +
          '<span style="font-size:11.5px;color:#9a93a4;">Artificial Planeswalker</span>' +
        "</div>" +
      "</div>" +
      // header
      '<div style="height:72px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid rgba(255,255,255,.06);background:linear-gradient(180deg,#150c10,#0c0709);">' +
        '<div style="display:flex;align-items:center;gap:14px;">' +
          '<h1 style="margin:0;font-family:\'Cinzel\',serif;font-weight:800;font-size:25px;color:#f3ece2;letter-spacing:.4px;">' + esc(DECK.name) + "</h1>" +
          '<span style="display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:#b7adc0;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:4px 11px;">' +
            '<span style="width:8px;height:8px;border-radius:50%;background:#e23a1e;"></span>' + esc(DECK.meta) +
          "</span>" +
        "</div>" +
        '<div style="display:flex;align-items:center;gap:18px;">' +
          '<div style="text-align:right;"><div style="font-size:9px;letter-spacing:1px;color:#7d7686;text-transform:uppercase;">Cards</div><div style="font-family:\'Cinzel\',serif;font-weight:700;font-size:18px;color:#f3ece2;line-height:1.1;">' + esc(DECK.totalCards) + "</div></div>" +
          '<div style="text-align:right;"><div style="font-size:9px;letter-spacing:1px;color:#7d7686;text-transform:uppercase;">Avg. MV</div><div style="font-family:\'Cinzel\',serif;font-weight:700;font-size:18px;color:#ff9a5a;line-height:1.1;">' + esc(DECK.avgCmc) + "</div></div>" +
        "</div>" +
      "</div>" +
      // body
      '<div style="flex:1;display:flex;min-height:0;">' +
        // left rail
        '<div style="width:300px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06);padding:20px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;background:linear-gradient(180deg,#0e0a0d,#0b0709);">' +
          '<div id="preview" style="display:flex;justify-content:center;">' + previewHtml() + "</div>" +
          "<div><div style=\"font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:#7d7686;margin-bottom:12px;font-weight:600;\">Mana curve</div>" +
            '<div style="display:flex;align-items:flex-end;gap:9px;">' + curveHtml() + "</div></div>" +
          '<div style="display:flex;align-items:center;gap:16px;">' +
            '<div style="position:relative;width:96px;height:96px;border-radius:50%;background:' + DECK.pieGradient + ';box-shadow:0 0 0 1px rgba(255,255,255,.06),0 6px 18px rgba(0,0,0,.5);flex-shrink:0;">' +
              '<div style="position:absolute;inset:24px;border-radius:50%;background:#120b0e;display:flex;flex-direction:column;align-items:center;justify-content:center;">' +
                '<span style="font-family:\'Cinzel\',serif;font-weight:700;font-size:17px;color:#f3ece2;line-height:1;">' + esc(DECK.totalCards) + '</span>' +
                '<span style="font-size:7.5px;color:#8f8598;letter-spacing:.5px;">CARDS</span>' +
              "</div></div>" +
            '<div style="flex:1;display:flex;flex-direction:column;gap:8px;">' + legendHtml() + "</div>" +
          "</div>" +
        "</div>" +
        // centre
        '<div style="flex:1;min-width:0;padding:20px 24px;overflow:auto;display:flex;flex-direction:column;gap:18px;">' +
          '<div style="display:flex;align-items:flex-start;gap:20px;">' + columnsHtml() + "</div>" +
          '<div style="margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:16px;">' +
            '<div style="font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:#7d7686;margin-bottom:11px;font-weight:600;">Lands &middot; ' + esc(DECK.landTotal) + "</div>" +
            '<div style="display:flex;flex-wrap:wrap;gap:8px;">' + landsHtml() + "</div>" +
          "</div>" +
        "</div>" +
      "</div>";

    applySelection();
  }

  function applySelection() {
    var nodes = document.querySelectorAll(".card");
    for (var i = 0; i < nodes.length; i++) {
      nodes[i].classList.toggle("selected", nodes[i].getAttribute("data-card-id") === selectedId);
    }
  }

  document.addEventListener("click", function (e) {
    var card = e.target.closest ? e.target.closest(".card") : null;
    if (!card) return;
    selectedId = card.getAttribute("data-card-id");
    document.getElementById("preview").innerHTML = previewHtml();
    applySelection();
  });

  render();
})();
</script>
</body>
</html>
