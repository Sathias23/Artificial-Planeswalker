repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      # Run the linter with auto-fix
      - id: ruff
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports]
        additional_dependencies:
          - pydantic>=2.12.0
          - sqlalchemy>=2.0.44
          - numpy>=2.0.0
          - mcp>=1.27.0
          - platformdirs>=4.0.0
        files: ^src/

  # Keep the committed plugin/ tree (the marketplace `source`) in sync with src/. When a source
  # input changes, rebuild it; pre-commit then fails if plugin/ was modified, prompting a re-add.
  - repo: local
    hooks:
      - id: build-plugin-sync
        name: rebuild plugin/ (keep marketplace source in sync with src/)
        entry: uv run python -m scripts.build_plugin
        language: system
        pass_filenames: false
        files: ^(src/|\.claude/skills/(magic-deckbuilding|mana-curve-analysis|synergy-discovery|format-legality)/|pyproject\.toml|uv\.lock|README\.md|LICENSE|NOTICE|scripts/build_plugin\.py)
