name: CI

# Quality gates for the public repo: mirrors the local pre-commit / CONTRIBUTING
# checks (ruff lint, ruff format, mypy --strict, pytest) on a Python 3.12/3.13 matrix.
# Runs on pushes to master and on every pull request. No DB, model, network, or
# secrets are required: pytest is scoped to "not integration".

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded PR runs, but let push-to-master runs finish so the
  # default branch always ends on a completed check.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: lint · types · tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies (locked)
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy src/

      - name: Pytest (excluding integration)
        run: uv run pytest -m "not integration"

      # The committed plugin/ tree is a generated build artifact (the marketplace `source`).
      # Rebuild it and fail if it drifts from src/ — i.e. someone changed src/skills/README/manifest
      # without re-running the build. The build writes LF on every OS, so this is platform-stable.
      - name: Plugin tree in sync with src/
        run: |
          uv run python -m scripts.build_plugin
          if [ -n "$(git status --porcelain -- plugin/)" ]; then
            echo "::error::plugin/ is stale — run 'uv run python -m scripts.build_plugin' and commit plugin/."
            git status --porcelain -- plugin/
            git --no-pager diff -- plugin/
            exit 1
          fi
