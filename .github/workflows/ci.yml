name: CI

# Quality gates for the public repo: mirrors the local pre-commit / CONTRIBUTING
# checks (ruff lint, ruff format, mypy --strict, pytest) on a Python 3.12/3.13 matrix.
# Runs on pushes to master and on every pull request. No DB, model, network, or
# secrets are required: pytest is scoped to "not integration".

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · types · tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy src/

      - name: Pytest (excluding integration)
        run: uv run pytest -m "not integration"
